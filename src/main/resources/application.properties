quarkus.analytics.disabled=true
quarkus.banner.enabled=false

# Keep the native macOS artifact short and stable: target/codex-usage-dashboard.
quarkus.package.output-name=codex-usage-dashboard
quarkus.package.jar.add-runner-suffix=false

quarkus.http.port=4318
quarkus.http.host=127.0.0.1
quarkus.grpc.server.port=4317
quarkus.grpc.server.host=127.0.0.1
# opentelemetry-proto ships no Jandex index, so without this Quarkus cannot see
# that OtlpGrpcReceiver extends the generated service bases and silently skips
# starting the gRPC server.
quarkus.index-dependency.otel-proto.group-id=io.opentelemetry.proto
quarkus.index-dependency.otel-proto.artifact-id=opentelemetry-proto
quarkus.log.category."io.quarkus".level=INFO

quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
# WAL + busy_timeout let SQLite keep one writer serialized while the dashboard's
# parallel read endpoints still get connections during ingest/annotation work.
quarkus.datasource.jdbc.url=jdbc:sqlite:data/codex-usage-dashboard.sqlite?journal_mode=WAL&busy_timeout=10000
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=4

# Codex's own SQLite DBs, opened read-only by the annotate job.
codex.db.dir=${user.home}/.codex
# Read-only open is retried on the open handshake (SQLITE_CANTOPEN) while Codex
# is mid-write; busy_timeout only covers locks *after* the file is open.
codex.open.timeout-ms=5000
codex.open.retries=2
codex.open.backoff-ms=500
# Codex CLI invoked by the usage job (app-server stdio rateLimits read).
codex.bin=codex
codex.usage.timeout-ms=15000

# Tool-specific ingestion flags. Disabling Codex also skips Codex usage polling.
codex-usage-dashboard.codex.enabled=true
codex-usage-dashboard.claude.enabled=true

# Receive-time filter: OTLP log records whose event.kind matches this regex are
# discarded before storage. Codex streaming deltas carry no token usage and at
# high volume can outpace the annotate job's batch throughput.
codex-usage-dashboard.ingest.drop-event-kinds=^response\\..+\\.delta$

# Scheduled job cadence (both independent, 1 minute by default).
codex-usage-dashboard.annotate.every=60s
codex-usage-dashboard.annotate.batch-size=500
codex-usage-dashboard.usage.every=60s
codex-usage-dashboard.retention.every=1h
codex-usage-dashboard.retention.otel-log-records=14d
codex-usage-dashboard.retention.annotated-events=365d
codex-usage-dashboard.retention.usage-samples=365d
